name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [source-updated]
  schedule:
    - cron: '17 2 * * *'

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout website repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve source revisions
        run: |
          agents_sha=$(git ls-remote https://github.com/lennonli/licheng-AGENTS.md.git refs/heads/main | cut -f1)
          skills_sha=$(git ls-remote https://github.com/lennonli/licheng-skills.git refs/heads/main | cut -f1)
          tutorials_sha=$(git ls-remote https://github.com/lennonli/licheng-AI-tutorials.git refs/heads/main | cut -f1)
          test -n "$agents_sha" && test -n "$skills_sha" && test -n "$tutorials_sha"
          echo "SOURCE_AGENTS_SHA=$agents_sha" >> "$GITHUB_ENV"
          echo "SOURCE_SKILLS_SHA=$skills_sha" >> "$GITHUB_ENV"
          echo "SOURCE_TUTORIALS_SHA=$tutorials_sha" >> "$GITHUB_ENV"

      - name: Build and test site
        run: npm test

      - name: Validate deploy configuration
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/.vitepress/dist --project-name=licheng-ai-site --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify public site
        run: |
          for attempt in $(seq 1 12); do
            home=$(curl --fail --silent --show-error https://ai.licheng.uk/ || true)
            if printf '%s' "$home" | grep -q '李成律师法律AI工作站' \
              && curl --fail --silent --show-error https://ai.licheng.uk/latest/ >/dev/null \
              && curl --fail --silent --show-error https://ai.licheng.uk/sitemap.xml >/dev/null \
              && curl --fail --silent --show-error https://ai.licheng.uk/feed.xml >/dev/null \
              && curl --fail --silent --show-error https://ai.licheng.uk/tutorials/new-vps-opencode-web-ui-setup-ABL-20260709-V1 >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo 'Public site verification failed after deployment.' >&2
          exit 1

      - name: Retain only the three newest Pages deployments
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          for round in $(seq 1 10); do
            npx wrangler pages deployment list --project-name=licheng-ai-site --json > deployments.json
            node --input-type=module -e "import fs from 'node:fs'; const rows=JSON.parse(fs.readFileSync('deployments.json','utf8')); for (const row of rows.slice(3)) console.log(row.Id ?? row.id)" > old-deployments.txt
            test -s old-deployments.txt || break
            while IFS= read -r deployment_id; do
              test -z "$deployment_id" || npx wrangler pages deployment delete "$deployment_id" --project-name=licheng-ai-site --force
            done < old-deployments.txt
          done
