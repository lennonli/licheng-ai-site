name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [source-updated]
  schedule:
    - cron: '17 * * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ANALYTICS_ACCESS_KEY: ${{ secrets.ANALYTICS_ACCESS_KEY }}
      CLOUDFLARE_ZONE_ID: 72900f423030570e3c629e54613716e6
      ANALYTICS_HOST: ai.licheng.uk
    steps:
      - name: Checkout website repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync content
        run: npm run sync

      - name: Build site
        run: npm run build

      - name: Configure analytics runtime secrets
        if: ${{ env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' && env.ANALYTICS_ACCESS_KEY != '' }}
        run: |
          printf '%s' "$ANALYTICS_ACCESS_KEY" | npx wrangler pages secret put ANALYTICS_ACCESS_KEY --project-name=licheng-ai-site
          printf '%s' "$CLOUDFLARE_API_TOKEN" | npx wrangler pages secret put CLOUDFLARE_API_TOKEN --project-name=licheng-ai-site
          printf '%s' "$CLOUDFLARE_ZONE_ID" | npx wrangler pages secret put CLOUDFLARE_ZONE_ID --project-name=licheng-ai-site
          printf '%s' "$ANALYTICS_HOST" | npx wrangler pages secret put ANALYTICS_HOST --project-name=licheng-ai-site

      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/.vitepress/dist --project-name=licheng-ai-site --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip deploy notice
        if: ${{ env.CLOUDFLARE_ACCOUNT_ID == '' || env.CLOUDFLARE_API_TOKEN == '' }}
        run: |
          echo "Cloudflare deploy skipped because CLOUDFLARE_ACCOUNT_ID or CLOUDFLARE_API_TOKEN is missing."
